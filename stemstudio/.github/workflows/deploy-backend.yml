name: Deploy Backend (Docker)

on:
  push:
    branches: [main]
    paths:
      - 'stemstudio/backend/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./stemstudio/backend
          push: true
          # Cache layers between builds for faster CI
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/stemstudio-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/stemstudio-backend:${{ github.sha }}

      # ── Optional: auto-deploy to VPS via SSH ─────────────────────────────
      # Uncomment this step and configure the secrets below to enable:
      #   SERVER_HOST     → IP or hostname of your VPS
      #   SERVER_USER     → SSH username (e.g. ubuntu, root)
      #   SSH_PRIVATE_KEY → private key matching the VPS authorized_keys
      #
      # - name: Deploy to VPS via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USER }}
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     script: |
      #       docker pull ${{ secrets.DOCKERHUB_USERNAME }}/stemstudio-backend:latest
      #       docker stop stemstudio || true
      #       docker rm stemstudio || true
      #       docker run -d --name stemstudio \
      #         -p 8000:8000 \
      #         -v /tmp/stemstudio:/tmp/stemstudio \
      #         --restart unless-stopped \
      #         ${{ secrets.DOCKERHUB_USERNAME }}/stemstudio-backend:latest
      #       echo "Deployed stemstudio-backend $(date)"

      - name: Deployment summary
        run: |
          echo "✅ Image pushed:"
          echo "   ${{ secrets.DOCKERHUB_USERNAME }}/stemstudio-backend:latest"
          echo "   ${{ secrets.DOCKERHUB_USERNAME }}/stemstudio-backend:${{ github.sha }}"
          echo ""
          echo "ℹ️  To auto-deploy to a VPS, configure SSH secrets and uncomment the SSH step."
